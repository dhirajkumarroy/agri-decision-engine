<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title if title else "🌾 Farmpilot AI" }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <!-- Chart -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: linear-gradient(150deg, #e8f5e9, #f1fff4);
            animation: fadeIn 0.8s ease-in-out;
        }

        .bg-circle {
            position: absolute;
            width: 140px;
            height: 140px;
            background: rgba(76, 175, 80, 0.15);
            border-radius: 50%;
            z-index: -1;
            animation: float 8s infinite ease-in-out;
        }

        .bg-circle:nth-child(1) { top: 8%; left: 10%; }
        .bg-circle:nth-child(2) { top: 50%; right: 5%; width: 100px; height: 100px; }
        .bg-circle:nth-child(3) { bottom: 10%; left: 20%; }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }

        .nav-custom {
            background: rgba(46, 125, 50, 0.9);
            backdrop-filter: blur(8px);
        }

        .nav-link {
            color: #ffffffcc !important;
            font-weight: 500;
        }

        .nav-link.active,
        .nav-link:hover {
            color: #fff !important;
        }

        .page-wrapper {
            animation: fadeIn 0.9s ease-in-out;
        }
    </style>
</head>

<body>

<!-- Background -->
<div class="bg-circle"></div>
<div class="bg-circle"></div>
<div class="bg-circle"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark nav-custom shadow sticky-top">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">🌾 Farmpilot AI</a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/predict' %}active{% endif %}" href="/predict">
                        🌱 Crop
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/dashboard' %}active{% endif %}" href="/dashboard">
                        📊 Dashboard
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/crop-info">
                        🌾 Info
                    </a>
                </li>

                <!-- NEW: Disease Detection -->
                <li class="nav-item">
                    <a class="nav-link" href="/predict">
                        🦠 Disease
                    </a>
                </li>

                <!-- NEW: IoT Irrigation -->
                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/iot-center' %}active{% endif %}" href="/iot-center">
                        💧 Irrigation
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/about' %}active{% endif %}" href="/about">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link {% if request.url.path == '/contact' %}active{% endif %}" href="/contact">
                        Contact
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container my-5 page-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- FOOTER -->
<footer class="text-center mt-5 text-muted">
    <small>© 2026 Farmpilot AI | Smart Farming System 🚀</small>
</footer>

<!-- JS FIXED -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
